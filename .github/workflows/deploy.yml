name: Deploy to Cloud Functions

permissions:
  contents: read
  id-token: write

on:
  workflow_dispatch:

jobs: # Sequence of jobs for this workflow
  deploy: # Name of the job
    runs-on: ubuntu-latest # Specify virtual machine for running the job
    env:
      PROJECT_ID: n8ns-468521
      REGION: europe-west1
      SOURCE_REPO: cloud-run-source-deploy
    steps: # Sequence of steps for this job
    - name: 'Checkout' # Checkout repo to virtual machine
      uses: 'actions/checkout@v4'

    - name: Show GitHub OIDC-relevant context
      run: |
        echo "repository=${{ github.repository }}"
        echo "ref=${{ github.ref }}"
        echo "ref_name=${{ github.ref_name }}"
        echo "actor=${{ github.actor }}"

    - name: 'Google auth' # Authenticate with GCP
      id: 'auth'
      uses: 'google-github-actions/auth@v2'
      with:
        workload_identity_provider: '${{ secrets.WIF_PROVIDER }}'
        service_account: '${{ secrets.WIF_SERVICE_ACCOUNT }}'
        create_credentials_file: true

    - name: Set up gcloud SDK
      uses: 'google-github-actions/setup-gcloud@v2'
      with:
        project_id: '${{ env.PROJECT_ID }}'

    - name: Ensure Artifact Registry source repository exists
      run: |
        if gcloud artifacts repositories describe "$SOURCE_REPO" \
          --location "$REGION" \
          --project "$PROJECT_ID" >/dev/null 2>&1; then
          echo "Artifact Registry repository '$SOURCE_REPO' already exists in $REGION."
        else
          echo "Artifact Registry repository '$SOURCE_REPO' not found; attempting to create it."
          gcloud artifacts repositories create "$SOURCE_REPO" \
            --repository-format=docker \
            --location "$REGION" \
            --description="Cloud Run source deploy repository" \
            --project "$PROJECT_ID" || {
              echo "Unable to create Artifact Registry repository."
              echo "Grant the deploy service account 'roles/artifactregistry.admin' once, or pre-create '$SOURCE_REPO' in $REGION as an administrator."
              exit 1
            }
        fi

    - name: Deploy hello_world_function # Deploy using gcloud functions
      run: |
        gcloud run jobs deploy job-quickstart \
        --source cloud_functions/hello_world \
        --tasks 1 \
        --set-env-vars SLEEP_MS=10000 \
        --set-env-vars FAIL_RATE=0.1 \
        --max-retries 5 \
        --region "$REGION" \
        --project "$PROJECT_ID"